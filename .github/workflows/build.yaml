name: Build and Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "examples/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "examples/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pandoc-eisvogel-ja

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Test base image
        run: |
          cd examples/basics
          docker run --rm -v $(pwd):/data ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -d config.yaml -o doc.pdf doc.md

      - name: Build plantuml image
        uses: docker/build-push-action@v7
        with:
          context: ./plantuml
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:plantuml
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_OWNER=${{ github.repository_owner }}

      - name: Test plantuml image
        run: |
          cd examples/plantuml
          docker run --rm -v $(pwd):/data ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:plantuml -o doc.pdf doc.md

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push base image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push plantuml image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:plantuml
